
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Game</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
}

input,button {
  margin:8px auto;
  padding:12px;
  width:85%;
  border-radius:10px;
  border:none;
}

button { background:#ff9800; color:white; }

canvas {
  border-radius:15px;
  width:95%;
  max-width:400px;
}

#jumpBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ff5722;
}

/* TOP BAR */
.topBar {
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  font-weight:bold;
}

.topBar div {
  padding:8px 15px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  cursor:pointer;
}

/* GAME STATS */
.gameStats {
  display:flex;
  justify-content:space-around;
  margin:15px;
  font-weight:bold;
}

/* SIDEBARS */
.sidebar {
  position: fixed;
  top: 0;
  height: 100%;
  width: 280px;
  background: #111;
  padding: 20px;
  transition: 0.3s;
  z-index:999;
}

#settingsPanel { right:-300px; }
#walletPanel { left:-300px; }

.closeBtn {
  color:red;
  font-size:20px;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>Running Game</h2>

<!-- LOGIN -->
<div id="loginPage">
<input id="loginEmail" placeholder="Email">

<div style="position:relative;width:85%;margin:auto;">
<input id="loginPassword" type="password" placeholder="Password">
<i class="fa-solid fa-eye" onclick="togglePassword('loginPassword',this)"
style="position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;"></i>
</div>

<button onclick="login()">Login</button>
<button onclick="showSignup()">Signup</button>
</div>

<!-- SIGNUP -->
<div id="signupPage" style="display:none;">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<div style="position:relative;width:85%;margin:auto;">
<input id="password" type="password" placeholder="Password">
<i class="fa-solid fa-eye" onclick="togglePassword('password',this)"
style="position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;"></i>
</div>

<button onclick="signup()">Create Account</button>
<button onclick="showLogin()">Back</button>
</div>

<!-- GAME UI -->
<div id="gameUI" style="display:none;">

<div class="topBar">
  <div onclick="openWallet()">💰 Wallet</div>
  <div onclick="openSettings()">⚙ Settings</div>
</div>

<div class="gameStats">
  <div>Name: <span id="playerName"></span></div>
  <div>Total: <span id="totalScore">0</span></div>
  <div>Score: <span id="score">0</span></div>
</div>

<canvas id="gameCanvas" width="400" height="200"></canvas>
</div>

<button id="jumpBtn" style="display:none;">JUMP</button>

<!-- SETTINGS -->
<div id="settingsPanel" class="sidebar">
<span class="closeBtn" onclick="closeSettings()">❌</span>

<h3>⚙ Settings</h3>

<p>Name: <span id="sName"></span></p>
<p>Email: <span id="sEmail"></span></p>
<p>Phone: <span id="sPhone"></span></p>

<input id="newName" placeholder="New Name">
<input id="newPhone" placeholder="New Phone">
<input id="newPassword" placeholder="New Password">

<button onclick="updateProfile()">Update</button>

<hr>

<h3>Reset Password</h3>
<input id="resetEmail" placeholder="Enter your email">
<button onclick="resetPassword()">Send Reset Link</button>

<hr>

<button onclick="logout()">Logout</button>
</div>

<!-- WALLET -->
<div id="walletPanel" class="sidebar">
<span class="closeBtn" onclick="closeWallet()">❌</span>

<h3>💰 Wallet</h3>

<p>Name: <span id="walletName"></span></p>
<p>Email: <span id="walletEmail"></span></p>
<p>Phone: <span id="walletPhone"></span></p>

<p id="walletStatus">Status: Not Submitted</p>

<input id="upiId" placeholder="Enter UPI ID">
<button onclick="saveUPI()">Save UPI</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updatePassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBUUbHGaMyuf8OXSAFfeb6OvlgVtHpGy0",
  authDomain: "zyro-play-studio.firebaseapp.com",
  projectId: "zyro-play-studio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user;

/* PASSWORD TOGGLE */
window.togglePassword = (id, icon) => {
  const input = document.getElementById(id);
  input.type = input.type === "password" ? "text" : "password";
};

/* NAVIGATION */
window.showSignup=()=>{loginPage.style.display="none";signupPage.style.display="block";}
window.showLogin=()=>{loginPage.style.display="block";signupPage.style.display="none";}

window.openSettings=()=>{walletPanel.style.left="-300px";settingsPanel.style.right="0";}
window.openWallet=()=>{settingsPanel.style.right="-300px";walletPanel.style.left="0";}
window.closeSettings=()=>settingsPanel.style.right="-300px";
window.closeWallet=()=>walletPanel.style.left="-300px";

/* SIGNUP */
window.signup = async () => {
  const res = await createUserWithEmailAndPassword(auth,email.value,password.value);
  user = res.user;

  await setDoc(doc(db,"users",user.uid),{
    name:name.value,
    email:email.value,
    phone:phone.value,
    score:0,
    upiStatus:"not submitted"
  });

  alert("Account Created");
  showLogin();
};

/* LOGIN */
window.login = async () => {
  const res = await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
  user = res.user;

  let snap = await getDoc(doc(db,"users",user.uid));
  let d = snap.data();

  playerName.innerText=d.name;
  totalScore.innerText=d.score;

  sName.innerText=d.name;
  sEmail.innerText=d.email;
  sPhone.innerText=d.phone;

  walletName.innerText=d.name;
  walletEmail.innerText=d.email;
  walletPhone.innerText=d.phone;

  resetEmail.value=d.email;

  updateStatusUI(d.upiStatus);

  loginPage.style.display="none";
  gameUI.style.display="block";
  jumpBtn.style.display="block";

  startGame();
};

/* WALLET STATUS */
function updateStatusUI(status){
  status=(status||"not submitted").toLowerCase();
  let text="Not Submitted", color="gray";

  if(status==="approved"){text="Approved";color="lime";}
  else if(status==="rejected"){text="Rejected";color="red";}
  else if(status==="paid"){text="Paid";color="cyan";}
  else if(status==="pending"){text="Pending";color="orange";}

  walletStatus.innerHTML=`Status: <span style="color:${color}">${text}</span>`;
}

/* SAVE UPI */
window.saveUPI = async ()=>{
  await updateDoc(doc(db,"users",user.uid),{
    upiId:upiId.value,
    upiStatus:"pending"
  });
  alert("UPI Saved ✅");
};

/* RESET PASSWORD */
window.resetPassword = async ()=>{
  await sendPasswordResetEmail(auth,resetEmail.value);
  alert("Reset link sent");
};

/* UPDATE PROFILE */
window.updateProfile = async ()=>{
  let ref=doc(db,"users",user.uid);
  let updates={};

  if(newName.value) updates.name=newName.value;
  if(newPhone.value) updates.phone=newPhone.value;

  if(Object.keys(updates).length>0){
    await updateDoc(ref,updates);
  }

  if(newPassword.value){
    await updatePassword(auth.currentUser,newPassword.value);
  }

  alert("Updated");
};

/* LOGOUT */
window.logout = async ()=>{
  await signOut(auth);
  location.reload();
};

/* GAME */
function startGame(){
 let ctx=gameCanvas.getContext("2d");
 let y=150,vy=0,obs=400,scoreVal=0;

 jumpBtn.onclick=()=>{if(y>=150)vy=-10};

 function loop(){
  ctx.clearRect(0,0,400,200);

  vy+=0.5;
  y+=vy;
  if(y>150){y=150;vy=0;}

  ctx.fillRect(50,y,20,20);

  obs-=5;
  if(obs<0){obs=400;scoreVal++;score.innerText=scoreVal;}

  ctx.fillRect(obs,150,20,20);

  if(obs<70 && y>130){
   alert("Game Over");
   return;
  }

  requestAnimationFrame(loop);
 }
 loop();
}
</script>

</body>
</html>
