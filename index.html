<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Game</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
}

input,button {
  margin:8px auto;
  padding:12px;
  width:85%;
  border-radius:10px;
  border:none;
}

button { background:#ff9800; color:white; }

canvas {
  border-radius:15px;
  width:95%;
  max-width:400px;
}

#jumpBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ff5722;
}

.topBar {
  display:flex;
  justify-content:space-between;
  padding:10px 20px;
  font-size:18px;
  font-weight:bold;
}

.topBar div {
  padding:8px 15px;
  border-radius:20px;
  background:rgba(255,255,255,0.1);
  box-shadow:0 0 10px rgba(255,255,255,0.3);
  cursor:pointer;
}

.gameStats {
  display:flex;
  justify-content:space-around;
  margin:15px;
  font-size:18px;
  font-weight:bold;
}

.sidebar {
  position: fixed;
  top: 0;
  height: 100%;
  width: 280px;
  background: #111;
  padding: 20px;
  transition: 0.3s;
  z-index:999;
  overflow-y:auto;
}

#settingsPanel { right: -300px; }
#walletPanel { left: -300px; }

.closeBtn {
  color:red;
  cursor:pointer;
}

table {
  width:70%;
  margin:auto;
}

.status {
  font-weight:bold;
  padding:6px 12px;
  border-radius:10px;
  display:inline-block;
}
</style>

</head>

<body>

<h2>Running Game</h2>

<div id="loginPage">
<input id="loginEmail" placeholder="Email">
<input id="loginPassword" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<button onclick="showSignup()">Signup</button>
</div>

<div id="signupPage" style="display:none;">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">
<input id="password" type="password" placeholder="Password">
<button onclick="signup()">Create Account</button>
<button onclick="showLogin()">Back</button>
</div>

<div id="gameUI" style="display:none;">
<div class="topBar">
  <div onclick="openWallet()">💰 Wallet</div>
  <div onclick="openSettings()">⚙ Settings</div>
</div>

<div class="gameStats">
  <div>Name: <span id="playerName"></span></div>
  <div>Rank: <span id="myRank">-</span></div>
  <div>Total: <span id="totalScore">0</span></div>
  <div>Score: <span id="score">0</span></div>
</div>

<canvas id="gameCanvas" width="400" height="200"></canvas>

</div>

<button id="jumpBtn" style="display:none;">JUMP</button>

<div id="settingsPanel" class="sidebar">
<span class="closeBtn" onclick="closeSettings()">❌</span>

<h3>⚙ Settings</h3>
<p>Name: <span id="sName"></span></p>
<p>Email: <span id="sEmail"></span></p>
<p>Phone: <span id="sPhone"></span></p>

<input id="newName" placeholder="New Name">
<input id="newPhone" placeholder="New Phone">
<input id="newPassword" type="password" placeholder="New Password">

<button onclick="updateProfile()">Update</button>

<hr>
<button onclick="logout()">Logout</button>
</div>

<div id="walletPanel" class="sidebar">
<span class="closeBtn" onclick="closeWallet()">❌</span>

<h3>💰 Wallet</h3>
<p>Name: <span id="walletName"></span></p>
<p>Rank: <span id="walletRank"></span></p>
<p>Email: <span id="walletEmail"></span></p>
<p>Phone: <span id="walletPhone"></span></p>

<p id="walletStatus">Status: Not Submitted</p>

<input id="upiId" placeholder="Enter UPI ID">
<button onclick="saveUPI()">Save UPI</button>
</div>

<h3>Leaderboard</h3>
<table id="leaderboard"></table>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updatePassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyBBUUbHGaMyuf8OXSAFfeb6OvlgVtHpGy0",
  authDomain: "zyro-play-studio.firebaseapp.com",
  projectId: "zyro-play-studio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user;
let gameRunning=false;

/* NAVIGATION */
window.showSignup=()=>{loginPage.style.display="none";signupPage.style.display="block";}
window.showLogin=()=>{loginPage.style.display="block";signupPage.style.display="none";}

window.openSettings=()=>{walletPanel.style.left="-300px";settingsPanel.style.right="0";}
window.openWallet=()=>{settingsPanel.style.right="-300px";walletPanel.style.left="0";}
window.closeSettings=()=>settingsPanel.style.right="-300px";
window.closeWallet=()=>walletPanel.style.left="-300px";

/* SIGNUP */
window.signup = async () => {
 try {
   if(!name.value || !email.value || !phone.value || !password.value){
     return alert("All fields required ❌");
   }

   let res = await createUserWithEmailAndPassword(auth,email.value,password.value);
   user = res.user;

   await setDoc(doc(db,"users",user.uid),{
     name:name.value,
     email:email.value,
     phone:phone.value,
     score:0,
     upiStatus:"not submitted"
   });

   alert("Account Created");
   showLogin();

 } catch(e) {
   if (e.code === "auth/email-already-in-use") {
     alert("This email is already registered ❌");
   } else {
     alert(e.message);
   }
 }
};

/* LOGIN */
window.login = async () => {
 try {
   let res = await signInWithEmailAndPassword(auth,loginEmail.value,loginPassword.value);
   user = res.user;

   let snap = await getDoc(doc(db,"users",user.uid));
   let d = snap.data();

   playerName.innerText=d.name;
   totalScore.innerText=d.score;

   sName.innerText=d.name;
   sEmail.innerText=d.email;
   sPhone.innerText=d.phone;

   walletName.innerText=d.name;
   walletEmail.innerText=d.email;
   walletPhone.innerText=d.phone;

   updateStatusUI(d.upiStatus);

   loginPage.style.display="none";
   gameUI.style.display="block";
   jumpBtn.style.display="block";

   leaderboardLive();
   userLiveData();
   startGame();

 } catch(e){
   alert("Invalid email or password ❌");
 }
};

/* LOGOUT */
window.logout=async()=>{
 await signOut(auth);
 location.reload();
};

/* UPDATE PROFILE */
window.updateProfile=async()=>{
 try{
   let ref=doc(db,"users",user.uid);
   let updates={};

   if(newName.value) updates.name=newName.value;
   if(newPhone.value) updates.phone=newPhone.value;

   if(Object.keys(updates).length>0){
     await updateDoc(ref,updates);
   }

   if(newPassword.value){
     await updatePassword(auth.currentUser,newPassword.value);
   }

   let snap = await getDoc(ref);
   let d = snap.data();

   playerName.innerText=d.name;
   sName.innerText=d.name;
   sPhone.innerText=d.phone;
   walletName.innerText=d.name;
   walletPhone.innerText=d.phone;

   alert("Updated Successfully");

 }catch(e){
   alert(e.message);
 }
};

/* WALLET */
window.saveUPI=async()=>{
 if(!upiId.value){
   return alert("Enter UPI ID ❌");
 }

 await updateDoc(doc(db,"users",user.uid),{
   upiId:upiId.value,
   upiStatus:"pending"
 });

 updateStatusUI("pending");
 alert("UPI Saved ✅");
};

function updateStatusUI(status){
 status=(status||"not submitted").toLowerCase();

 let text="Not Submitted",color="#ccc";
 if(status==="pending"){text="⏳ Pending";color="orange";}
 if(status==="approved"){text="🟢 Approved";color="lime";}
 if(status==="rejected"){text="❌ Rejected";color="red";}
 if(status==="paid"){text="💰 Paid";color="cyan";}

 walletStatus.innerHTML=`Status: <span class="status" style="color:${color}">${text}</span>`;
}

function userLiveData(){
 onSnapshot(doc(db,"users",user.uid),(snap)=>{
   let d=snap.data();
   updateStatusUI(d.upiStatus);

   playerName.innerText=d.name;
   totalScore.innerText=d.score;
   sName.innerText=d.name;
   sPhone.innerText=d.phone;
   walletName.innerText=d.name;
   walletPhone.innerText=d.phone;
 });
}

/* LEADERBOARD */
function leaderboardLive(){
 const q=query(collection(db,"users"),orderBy("score","desc"));
 onSnapshot(q,(snap)=>{
  leaderboard.innerHTML="<tr><th>Rank</th><th>Name</th><th>Score</th></tr>";
  let r=1;
  snap.forEach(docSnap=>{
    let d=docSnap.data();
    leaderboard.innerHTML+=`<tr><td>${r}</td><td>${d.name}</td><td>${d.score||0}</td></tr>`;
    if(user && docSnap.id===user.uid){
      myRank.innerText=r;
      walletRank.innerText=r;
    }
    r++;
  });
 });
}

/* GAME */
function startGame(){
 gameRunning=true;
 let ctx=gameCanvas.getContext("2d");
 let p={x:50,y:150,vy:0},o={x:400},scoreVal=0;

 jumpBtn.onclick=()=>{ if(p.y>=150) p.vy=-10; };

 function loop(){
  if(!gameRunning) return;

  ctx.clearRect(0,0,400,200);

  p.vy+=0.5;
  p.y+=p.vy;
  if(p.y>150){p.y=150;p.vy=0;}

  ctx.fillRect(p.x,p.y,20,20);

  o.x-=5;
  if(o.x<0){o.x=400;scoreVal++;score.innerText=scoreVal;}

  ctx.fillRect(o.x,150,20,20);

  if(o.x<70 && p.y>130){
    gameRunning=false;
    saveScore(scoreVal);
    setTimeout(startGame,1000);
    return;
  }

  requestAnimationFrame(loop);
 }
 loop();
}

async function saveScore(newScore){
 let ref=doc(db,"users",user.uid);
 let snap=await getDoc(ref);
 let updated=(snap.data().score||0)+newScore;
 await updateDoc(ref,{score:updated});
 totalScore.innerText=updated;
}
</script>

</body>
</html>
