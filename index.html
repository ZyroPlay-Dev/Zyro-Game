<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Running Game</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin:0;
  font-family:Poppins;
  background:linear-gradient(135deg,#1e3c72,#2a5298);
  color:white;
  text-align:center;
}

input,button {
  margin:8px auto;
  padding:12px;
  width:85%;
  border-radius:10px;
  border:none;
}

button { background:#ff9800; color:white; }

canvas {
  border-radius:15px;
  width:95%;
  max-width:400px;
}

#jumpBtn {
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:#ff5722;
}

.sidebar {
  position: fixed;
  top: 0;
  height: 100%;
  width: 280px;
  background: #111;
  padding: 20px;
  transition: 0.3s;
}

#settingsPanel { right: -300px; }

.closeBtn { color:red; cursor:pointer; }
</style>
</head>

<body>

<h2>Running Game</h2>

<!-- LOGIN -->
<div id="loginPage">
<input id="loginEmail" placeholder="Email">

<div style="position:relative;width:85%;margin:auto;">
<input id="loginPassword" type="password" placeholder="Password">
<i class="fa-solid fa-eye" onclick="togglePassword('loginPassword',this)"
style="position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;"></i>
</div>

<button onclick="login()">Login</button>
<button onclick="showSignup()">Signup</button>
</div>

<!-- SIGNUP -->
<div id="signupPage" style="display:none;">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<input id="phone" placeholder="Phone">

<div style="position:relative;width:85%;margin:auto;">
<input id="password" type="password" placeholder="Password">
<i class="fa-solid fa-eye" onclick="togglePassword('password',this)"
style="position:absolute;right:15px;top:50%;transform:translateY(-50%);cursor:pointer;"></i>
</div>

<button onclick="signup()">Create Account</button>
<button onclick="showLogin()">Back</button>
</div>

<!-- GAME -->
<div id="gameUI" style="display:none;">
<p>Name: <span id="playerName"></span></p>
<p>Total Score: <span id="totalScore">0</span></p>
<p>Score: <span id="score">0</span></p>

<canvas id="gameCanvas" width="400" height="200"></canvas>
</div>

<button id="jumpBtn" style="display:none;">JUMP</button>

<!-- SETTINGS -->
<div id="settingsPanel" class="sidebar">
<span class="closeBtn" onclick="closeSettings()">❌</span>

<h3>Settings</h3>

<p>Name: <span id="sName"></span></p>
<p>Email: <span id="sEmail"></span></p>
<p>Phone: <span id="sPhone"></span></p>

<input id="newName" placeholder="New Name">
<input id="newPhone" placeholder="New Phone">
<input id="newPassword" placeholder="New Password">

<button onclick="updateProfile()">Update</button>

<hr>

<h3>Reset Password</h3>
<input id="resetEmail" placeholder="Enter your email">
<button onclick="resetPassword()">Send Reset Link</button>

<hr>

<button onclick="logout()">Logout</button>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, updatePassword, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBBUUbHGaMyuf8OXSAFfeb6OvlgVtHpGy0",
  authDomain: "zyro-play-studio.firebaseapp.com",
  projectId: "zyro-play-studio"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let user;

/* PASSWORD TOGGLE */
window.togglePassword = (id, icon) => {
  const input = document.getElementById(id);
  if (input.type === "password") {
    input.type = "text";
    icon.classList.replace("fa-eye", "fa-eye-slash");
  } else {
    input.type = "password";
    icon.classList.replace("fa-eye-slash", "fa-eye");
  }
};

/* SIGNUP */
window.signup = async () => {
  try {
    const userName = document.getElementById("name").value.trim();
    const userEmail = document.getElementById("email").value.trim();
    const userPhone = document.getElementById("phone").value.trim();
    const userPassword = document.getElementById("password").value;

    if (!userName || !userEmail || !userPhone || !userPassword) {
      alert("All fields are required ❌");
      return;
    }

    const res = await createUserWithEmailAndPassword(auth, userEmail, userPassword);
    user = res.user;

    await setDoc(doc(db, "users", user.uid), {
      name: userName,
      email: userEmail,
      phone: userPhone,
      score: 0,
      upiStatus: "not submitted"
    });

    alert("Account Created Successfully 🎉");
    showLogin();

  } catch (e) {
    console.error(e);
    alert(e.message);
  }
};

/* LOGIN */
window.login = async () => {
  try {
    const userEmail = document.getElementById("loginEmail").value.trim();
    const userPassword = document.getElementById("loginPassword").value;

    if (!userEmail || !userPassword) {
      alert("Enter email and password ❌");
      return;
    }

    const res = await signInWithEmailAndPassword(auth, userEmail, userPassword);
    user = res.user;

    let snap = await getDoc(doc(db, "users", user.uid));
    let d = snap.data();

    playerName.innerText = d.name || "-";
    totalScore.innerText = d.score || 0;

    sName.innerText = d.name || "-";
    sEmail.innerText = d.email || "-";
    sPhone.innerText = d.phone || "-";

    resetEmail.value = d.email || "";

    loginPage.style.display = "none";
    gameUI.style.display = "block";
    jumpBtn.style.display = "block";

    startGame();

  } catch (e) {
    if (e.code === "auth/user-not-found") {
      alert("Email not registered ❌");
    } else if (e.code === "auth/wrong-password") {
      alert("Wrong password ❌");
    } else {
      alert("Invalid email or password ❌");
    }
  }
};

/* RESET PASSWORD */
window.resetPassword = async () => {
  try {
    const emailValue = document.getElementById("resetEmail").value.trim();
    if (!emailValue) return alert("Enter email ❌");

    await sendPasswordResetEmail(auth, emailValue);
    alert("Reset link sent 📩");

  } catch (e) {
    alert(e.message);
  }
};

/* LOGOUT */
window.logout = async () => {
  await signOut(auth);
  location.reload();
};

/* SIMPLE GAME */
function startGame(){
 let ctx=gameCanvas.getContext("2d");
 let y=150,vy=0,obs=400,scoreVal=0;

 jumpBtn.onclick=()=>{if(y>=150)vy=-10};

 function loop(){
  ctx.clearRect(0,0,400,200);

  vy+=0.5;
  y+=vy;
  if(y>150){y=150;vy=0;}

  ctx.fillRect(50,y,20,20);

  obs-=5;
  if(obs<0){obs=400;scoreVal++;score.innerText=scoreVal;}

  ctx.fillRect(obs,150,20,20);

  if(obs<70 && y>130){
   alert("Game Over");
   return;
  }

  requestAnimationFrame(loop);
 }
 loop();
}

window.showSignup=()=>{loginPage.style.display="none";signupPage.style.display="block";}
window.showLogin=()=>{loginPage.style.display="block";signupPage.style.display="none";}
window.closeSettings=()=>settingsPanel.style.right="-300px";
window.openSettings=()=>settingsPanel.style.right="0";

</script>

</body>
</html>
